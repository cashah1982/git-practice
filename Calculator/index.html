<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f0f13;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    .calculator {
      background: #1a1a24;
      border: 1px solid #2e2e42;
      border-radius: 20px;
      padding: 24px;
      width: 320px;
      box-shadow: 0 24px 64px rgba(0,0,0,.6);
    }

    /* Display */
    .display {
      background: #0f0f13;
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 20px;
      text-align: right;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      gap: 4px;
    }

    .display .expression {
      font-size: 0.85rem;
      color: #6b6b8a;
      min-height: 1.2em;
      word-break: break-all;
    }

    .display .current {
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: -0.5px;
      word-break: break-all;
      transition: font-size 0.1s;
    }

    /* Button grid */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      height: 62px;
      cursor: pointer;
      transition: transform 0.08s, filter 0.08s;
      font-weight: 500;
    }

    button:active { transform: scale(0.93); filter: brightness(1.2); }

    /* Variants */
    .btn-num {
      background: #25253a;
      color: #e0e0f0;
    }
    .btn-num:hover { background: #2d2d4a; }

    .btn-op {
      background: #7c3aed;
      color: #fff;
    }
    .btn-op:hover { background: #6d28d9; }
    .btn-op.active { background: #ddd6fe; color: #3b0764; }

    .btn-eq {
      background: #7c3aed;
      color: #fff;
      grid-column: span 2;
    }
    .btn-eq:hover { background: #6d28d9; }

    .btn-clear {
      background: #3f1515;
      color: #f87171;
    }
    .btn-clear:hover { background: #5b1a1a; }

    .btn-del {
      background: #25253a;
      color: #f87171;
    }
    .btn-del:hover { background: #2d2d4a; }

    .btn-zero { grid-column: span 2; }

    /* Error shake */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-6px); }
      40%,80% { transform: translateX(6px); }
    }
    .shake { animation: shake 0.35s ease; }
  </style>
</head>
<body>
  <div class="calculator">
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="current" id="current">0</div>
    </div>
    <div class="buttons">
      <button class="btn-clear" id="btn-ac">AC</button>
      <button class="btn-del" id="btn-del">⌫</button>
      <button class="btn-op" data-op="%">%</button>
      <button class="btn-op" data-op="/">÷</button>

      <button class="btn-num" data-digit="7">7</button>
      <button class="btn-num" data-digit="8">8</button>
      <button class="btn-num" data-digit="9">9</button>
      <button class="btn-op" data-op="*">×</button>

      <button class="btn-num" data-digit="4">4</button>
      <button class="btn-num" data-digit="5">5</button>
      <button class="btn-num" data-digit="6">6</button>
      <button class="btn-op" data-op="-">−</button>

      <button class="btn-num" data-digit="1">1</button>
      <button class="btn-num" data-digit="2">2</button>
      <button class="btn-num" data-digit="3">3</button>
      <button class="btn-op" data-op="+">+</button>

      <button class="btn-num btn-zero" data-digit="0">0</button>
      <button class="btn-num" data-digit=".">.</button>
      <button class="btn-eq" id="btn-eq">=</button>
    </div>
  </div>

  <script>
    const displayCurrent = document.getElementById('current');
    const displayExpr    = document.getElementById('expression');

    let num1 = null, op = null, input = '0', justEvaled = false;

    const fmt = n => {
      const s = parseFloat(n.toPrecision(12)).toString();
      return s.length > 14 ? parseFloat(n.toPrecision(8)).toString() : s;
    };

    const render = () => {
      displayCurrent.textContent = input;
      displayCurrent.style.fontSize = input.length > 10 ? '1.4rem' : '2.2rem';
    };

    const setExpr = text => { displayExpr.textContent = text; };

    const opLabel = { '+': '+', '-': '−', '*': '×', '/': '÷', '%': '%' };

    // Highlight active operator
    document.querySelectorAll('.btn-op').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.btn-op').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
      });
    });

    function pressDigit(d) {
      document.querySelectorAll('.btn-op').forEach(x => x.classList.remove('active'));
      if (justEvaled) { input = '0'; justEvaled = false; }
      if (d === '.' && input.includes('.')) return;
      input = input === '0' && d !== '.' ? d : input + d;
      render();
    }

    function pressOp(o) {
      if (o === '%') {
        input = String(parseFloat(input) / 100);
        render();
        return;
      }
      if (num1 !== null && !justEvaled) {
        // chain: evaluate previous before setting new op
        evaluate(true);
      }
      num1 = parseFloat(input);
      op   = o;
      justEvaled = false;
      setExpr(`${fmt(num1)} ${opLabel[o]}`);
      input = '0';
      render();
    }

    async function evaluate(chaining = false) {
      if (num1 === null || op === null) return;
      const num2 = parseFloat(input);
      setExpr(`${fmt(num1)} ${opLabel[op]} ${fmt(num2)} =`);
      try {
        const resp = await fetch('/api/calc', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ num1, num2, op }),
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.detail || 'Error');
        input = fmt(data.result);
        if (!chaining) { num1 = null; op = null; justEvaled = true; }
        else { num1 = data.result; }
        render();
      } catch (err) {
        input = 'Error';
        displayCurrent.classList.add('shake');
        setTimeout(() => displayCurrent.classList.remove('shake'), 400);
        render();
        num1 = null; op = null; justEvaled = true;
      }
    }

    function clear() {
      num1 = null; op = null; input = '0'; justEvaled = false;
      setExpr('');
      render();
      document.querySelectorAll('.btn-op').forEach(x => x.classList.remove('active'));
    }

    function del() {
      if (justEvaled || input === 'Error') { clear(); return; }
      input = input.length > 1 ? input.slice(0, -1) : '0';
      render();
    }

    // Button wiring
    document.querySelectorAll('[data-digit]').forEach(b =>
      b.addEventListener('click', () => pressDigit(b.dataset.digit)));
    document.querySelectorAll('[data-op]').forEach(b =>
      b.addEventListener('click', () => pressOp(b.dataset.op)));
    document.getElementById('btn-eq').addEventListener('click', () => evaluate());
    document.getElementById('btn-ac').addEventListener('click', clear);
    document.getElementById('btn-del').addEventListener('click', del);

    // Keyboard support
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') pressDigit(e.key);
      else if (e.key === '.') pressDigit('.');
      else if (['+', '-', '*', '/'].includes(e.key)) pressOp(e.key);
      else if (e.key === 'Enter' || e.key === '=') evaluate();
      else if (e.key === 'Backspace') del();
      else if (e.key === 'Escape') clear();
      else if (e.key === '%') pressOp('%');
    });

    render();
  </script>
</body>
</html>
